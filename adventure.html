<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Adventure Awaits | Chattanooga Adventures</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <a href="#main" class="skip-link">Skip to content</a>

    <header class="site-header">
      <nav class="site-nav" aria-label="Main navigation">
        <a href="/" class="site-nav__logo">Chattanooga Adventures</a>
      </nav>
    </header>

    <main id="main" class="adventure-page">
      <section class="adventure-teaser" id="teaser" aria-labelledby="teaser-heading">
        <h1 id="teaser-heading" class="adventure-teaser__title">Your Next Adventure Awaits!</h1>
        <button class="btn btn--reveal" id="reveal-btn" type="button">Reveal My Adventure</button>
      </section>

      <section class="adventure-content" id="adventure-content" hidden>
        <h2 class="adventure-content__title" id="adventure-title" tabindex="-1"></h2>
        <p class="adventure-content__description" id="adventure-description"></p>
      </section>

      <section class="adventure-error" id="adventure-error" hidden>
        <h1 tabindex="-1" id="error-heading">Oops!</h1>
        <p id="error-message">We couldn't find that adventure.</p>
        <a href="/" class="btn btn--secondary">Back to Home</a>
      </section>
    </main>

    <footer class="site-footer">
      <nav aria-label="Footer navigation">
        <a href="/">Home</a>
        <a href="/support">Support</a>
      </nav>
      <p>&copy; 2026 Chattanooga Adventures. All rights reserved.</p>
    </footer>

    <script type="module" src="js/adventure.js"></script>
  </body>
</html>
