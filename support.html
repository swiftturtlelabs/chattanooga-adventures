<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Support | Chattanooga Adventures</title>
    <meta
      name="description"
      content="Contact Chattanooga Adventures for support, feedback, or suggestions."
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <a href="#main" class="skip-link">Skip to content</a>

    <header class="site-header">
      <nav class="site-nav" aria-label="Main navigation">
        <a href="/" class="site-nav__logo">Chattanooga Adventures</a>
      </nav>
    </header>

    <main id="main" class="support-page">
      <section aria-labelledby="support-heading">
        <h1 id="support-heading">Contact Us</h1>
        <p>Have a question, missing card, or suggestion? We'd love to hear from you.</p>

        <form id="support-form" class="support-form" novalidate>
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="from_name" required autocomplete="name" />
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="from_email" required autocomplete="email" />
          </div>

          <div class="form-group">
            <label for="subject">Subject</label>
            <select id="subject" name="subject" required>
              <option value="">Select a topic...</option>
              <option value="General">General</option>
              <option value="Missing Card">Missing Card</option>
              <option value="Damaged Box">Damaged Box</option>
              <option value="Suggestion">Suggestion</option>
              <option value="Other">Other</option>
            </select>
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" required></textarea>
          </div>

          <button type="submit" class="btn btn--primary" id="submit-btn">Send Message</button>

          <div id="form-status" class="form-status" role="status" aria-live="polite"></div>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <nav aria-label="Footer navigation">
        <a href="/">Home</a>
      </nav>
      <p>&copy; 2026 Chattanooga Adventures. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="module" src="js/support.js"></script>
  </body>
</html>
