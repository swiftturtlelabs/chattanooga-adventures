name: Deploy to Firebase (Test)

on:
  push:
    branches:
      - test
  pull_request:
    branches:
      - test

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  unit-tests:
    uses: ./.github/workflows/unit_tests.yml

  e2e-tests:
    uses: ./.github/workflows/e2e_tests.yml

  deploy:
    name: Deploy to Firebase Hosting (Test)
    if: github.event_name == 'push'
    needs: [unit-tests, e2e-tests]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          target: test

  lighthouse:
    name: Lighthouse CI Audit
    needs: deploy
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Lighthouse CI
        run: npx lhci autorun

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report-test
          path: .lighthouseci/

  link-check:
    name: Link Check
    needs: deploy
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Check for broken links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --accept 200,204,301,302,403
            https://chattanooga-adventures-test.web.app
            https://chattanooga-adventures-test.web.app/support
            https://chattanooga-adventures-test.web.app/adventure?box=original&adventure=1
          fail: true

  preview:
    name: Deploy Preview
    if: github.event_name == 'pull_request'
    needs: [unit-tests, e2e-tests]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy preview channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: "pr-${{ github.event.pull_request.number }}"
          target: test
