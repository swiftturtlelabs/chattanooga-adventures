name: E2E Tests

on:
  push:
    branches: [test, main]
  workflow_call:

jobs:
  e2e:
    name: E2E & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=critical

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run Playwright tests
        run: npx playwright test

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Start Firestore emulator and run rules tests
        run: |
          firebase emulators:start --only firestore --project chattanooga-adventures-test &
          sleep 8
          npx vitest run --dir tests/api
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8080

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/

      - name: Upload visual regression snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-snapshots
          path: tests/ui/**/*-snapshots/
          if-no-files-found: ignore
